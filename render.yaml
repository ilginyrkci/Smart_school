services:
  - type: web
    name: smart-finance-coach-backend
    runtime: java
    rootDir: backend
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/smart-finance-coach-1.0.0.jar
    healthCheckPath: /api/transactions
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: PGHOST
        fromDatabase:
          name: smart-finance-db
          property: host
      - key: PGPORT
        fromDatabase:
          name: smart-finance-db
          property: port
      - key: PGDATABASE
        fromDatabase:
          name: smart-finance-db
          property: database
      - key: PGUSER
        fromDatabase:
          name: smart-finance-db
          property: user
      - key: PGPASSWORD
        fromDatabase:
          name: smart-finance-db
          property: password

databases:
  - name: smart-finance-db
    databaseName: finansdb
    user: finansuser
    plan: free
