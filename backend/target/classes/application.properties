# ==========================================
# Akıllı Harçlık & Finans Koçu — Uygulama Ayarları (Yerel / H2)
# ==========================================

# Sunucu portu
server.port=${PORT:8080}

# ==========================================
# H2 In-Memory Veritabanı (Yerel Geliştirme)
# ==========================================
spring.datasource.url=jdbc:h2:mem:finansdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Web Konsolu (http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ==========================================
# JPA / Hibernate Ayarları
# ==========================================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
