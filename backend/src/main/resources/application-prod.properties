# ==========================================
# PROD Profili — Render + PostgreSQL
# ==========================================

server.port=${PORT:8080}

# ==========================================
# PostgreSQL (Render tarafından sağlanır)
# Render, DATABASE_URL'yi postgresql:// formatında verir
# Spring Boot jdbc:postgresql:// formatını bekler — spring.datasource.url ayrıca set ediyoruz
# ==========================================
spring.datasource.url=jdbc:postgresql://${PGHOST}:${PGPORT:5432}/${PGDATABASE:finansdb}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}

# H2 console devre dışı
spring.h2.console.enabled=false

# ==========================================
# JPA / Hibernate
# ==========================================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
