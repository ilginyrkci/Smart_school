# ==========================================
# PROD Profili — Railway + PostgreSQL
# ==========================================
# Railway bu değişkenleri otomatik olarak sağlar.

server.port=${PORT:8080}

# ==========================================
# PostgreSQL (Railway tarafından sağlanır)
# ==========================================
spring.datasource.url=${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD}

# H2 console devre dışı
spring.h2.console.enabled=false

# ==========================================
# JPA / Hibernate
# ==========================================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ==========================================
# CORS — Vercel frontend URL'sini kabul et
# ==========================================
spring.web.cors.allowed-origins=${FRONTEND_URL:*}
